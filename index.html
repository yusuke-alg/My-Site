<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Site Web</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="#accueil">Accueil</a></li>
        <li><a href="#portfolio">Portfolio</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section id="accueil" class="hero" data-aos="fade-in">
    <img src=""
    <h1>Bienvenue BLOX FRUIT HELP</h1>
    <p>Voici mon portfolio et plus encore!</p>
  </section>

  <section id="portfolio" class="portfolio" data-aos="fade-up">
    <h2>Mon Portfolio</h2>
    <div class="portfolio-items">
      <div class="item">
        <img src="https://via.placeholder.com/300" alt="Projet 1">
        <p>Projet 1</p>
      </div>
      <div class="item">
        <img src="https://via.placeholder.com/300" alt="Projet 2">
        <p>Projet 2</p>
      </div>
      <div class="item">
        <img src="https://via.placeholder.com/300" alt="Projet 3">
        <p>Projet 3</p>
      </div>
    </div>
  </section>

  <section id="contact" class="contact" data-aos="fade-up">
    <h2>Contactez-moi</h2>
    <form>
      <input type="text" placeholder="Votre nom" required>
      <input type="email" placeholder="Votre email" required>
      <textarea placeholder="Votre message" required></textarea>
      <button type="submit">Envoyer</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2025 Mon Site Web</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
